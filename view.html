<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>View Generation — Entropy Tools</title>
<style>
/* ═══════════════════════════════════════════
   ENTROPY TOOLS — Design System
   Aesthetic: Dark industrial / crypto terminal
═══════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Satoshi:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap');
/* Satoshi fallback via CDN */
@import url('https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap');

:root {
  /* ── Fintech Dark Palette ── */
  --bg:        #0B0E11;
  --bg2:       #0D1117;
  --surface:   #111419;
  --card:      #151A1F;
  --card2:     #1A2028;
  --border:    #1E2530;
  --border2:   #252E3A;

  /* Mint / Cyan accents */
  --gold:      #00FFA3;
  --gold2:     #7BFFCF;
  --gold-dim:  rgba(0,255,163,.1);
  --gold-glow: rgba(0,255,163,.2);

  --cyan:      #00E5FF;
  --cyan2:     #38CFFF;
  --cyan-dim:  rgba(0,229,255,.1);
  --cyan-glow: rgba(0,229,255,.2);

  --red:       #FF4560;
  --green:     #00FFA3;
  --green-dim: rgba(0,255,163,.08);

  /* Typography */
  --text:      #F0F4F8;
  --text2:     #8896A8;
  --text3:     #445566;

  /* Fonts — Satoshi + Inter + JetBrains Mono */
  --font-display: 'Satoshi', 'Inter', sans-serif;
  --font-body:    'Inter', 'Satoshi', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  /* Spacing */
  --nav-h: 68px;

  /* Transitions */
  --t: .2s ease;
  --t-slow: .4s ease;

  /* Glass */
  --glass-bg:     rgba(21,26,31,.7);
  --glass-border: rgba(0,255,163,.12);
  --glass-glow:   rgba(0,255,163,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); box-shadow: 0 0 6px var(--gold-glow); }

/* ── SELECTION ── */
::selection { background: rgba(0,255,163,.15); color: var(--gold2); }

/* ── NOISE TEXTURE OVERLAY ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: .4;
}

/* ── GRID BACKGROUND ── */
.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,255,163,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,163,.03) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
}
.grid-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,255,163,.05), transparent 60%);
}

/* ══════════════════════════════
   NAVIGATION
══════════════════════════════ */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  background: rgba(11,14,17,.85);
  box-shadow: 0 1px 0 rgba(0,255,163,.08);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  z-index: 500;
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--gold);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-logo .logo-icon {
  width: 34px; height: 34px;
  border: 1px solid rgba(0,255,163,.4);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .9rem;
  box-shadow: 0 0 12px var(--gold-glow);
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;
  list-style: none;
}
.nav-links a {
  color: var(--text2);
  text-decoration: none;
  font-size: .85rem;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 6px;
  letter-spacing: .5px;
  transition: var(--t);
}
.nav-links a:hover, .nav-links a.active { color: var(--gold); background: var(--gold-dim); }
.nav-right { display: flex; align-items: center; gap: 12px; }
.balance-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 7px 14px;
  font-family: var(--font-mono);
  font-size: .75rem;
  cursor: pointer;
  transition: var(--t);
}
.balance-pill:hover { border-color: var(--gold); }
.balance-pill .pulse {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

/* ══════════════════════════════
   BUTTONS — Uiverse.io by Spacious74
   Gold-themed for Entropy Tools
══════════════════════════════ */

/* ── BASE SHELL (the outer gradient border) ── */
.btn {
  cursor: pointer;
  border-radius: 16px;
  border: none;
  padding: 2px;
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  white-space: nowrap;
  font-family: var(--font-display);
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: transform .2s ease, box-shadow .2s ease;
  /* default shell gradient */
  background: radial-gradient(circle 80px at 80% -10%, #3a2e00, #181b1b);
  overflow: visible;
}
.btn::after {
  content: "";
  position: absolute;
  width: 65%;
  height: 60%;
  border-radius: 120px;
  top: 0; right: 0;
  box-shadow: 0 0 20px rgba(245,166,35,.2);
  z-index: -1;
  pointer-events: none;
}
.btn:hover  { transform: translateY(-2px); }
.btn:active { transform: scale(.96); }

/* ── BLOB (cyan-blue accent, bottom-left) ── */
.btn .blob1 {
  position: absolute;
  width: 70px;
  height: 100%;
  border-radius: 16px;
  bottom: 0; left: 0;
  background: radial-gradient(
    circle 60px at 0% 100%,
    rgba(0,255,163,.3),
    rgba(0,180,140,.15),
    transparent
  );
  box-shadow: -10px 10px 30px rgba(0,255,163,.1);
  pointer-events: none;
  z-index: 0;
}

/* ── INNER SURFACE ── */
.btn .inner {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 22px;
  border-radius: 14px;
  color: #fff;
  z-index: 3;
  position: relative;
  width: 100%;
  background: radial-gradient(circle 80px at 80% -50%, #0d1f18, #0b0e11);
  transition: background .2s ease;
}
.btn .inner::before {
  content: "";
  width: 100%; height: 100%;
  left: 0; top: 0;
  border-radius: 14px;
  background: radial-gradient(
    circle 60px at 0% 100%,
    rgba(245,166,35,.15),
    rgba(180,100,0,.08),
    transparent
  );
  position: absolute;
  pointer-events: none;
}

/* ─────────────────────────────
   VARIANTS
───────────────────────────── */

/* GOLD — primary CTA */
.btn-gold {
  background: radial-gradient(circle 80px at 80% -10%, #c0fff0, #003825);
  box-shadow: 0 0 18px rgba(0,255,163,.3), 0 4px 16px rgba(0,0,0,.5);
}
.btn-gold::after {
  box-shadow: 0 0 24px rgba(0,255,163,.3);
}
.btn-gold .blob1 {
  background: radial-gradient(circle 60px at 0% 100%, rgba(0,255,163,.5), rgba(0,229,255,.25), transparent);
  box-shadow: -10px 10px 30px rgba(0,255,163,.15);
}
.btn-gold .inner {
  background: radial-gradient(circle 80px at 80% -50%, #003d28, #060f0a);
  color: #00FFA3;
}
.btn-gold:hover {
  box-shadow: 0 0 36px rgba(0,255,163,.45), 0 6px 24px rgba(0,0,0,.5);
}

/* OUTLINE — secondary */
.btn-outline {
  background: radial-gradient(circle 80px at 80% -10%, #0a1f15, #0b0e11);
  box-shadow: 0 0 0 1px rgba(0,255,163,.35);
}
.btn-outline .blob1 {
  background: radial-gradient(circle 60px at 0% 100%, rgba(0,255,163,.2), transparent);
}
.btn-outline .inner {
  background: radial-gradient(circle 80px at 80% -50%, #061510, #080b0e);
  color: var(--gold);
  border: 1px solid rgba(0,255,163,.25);
}
.btn-outline:hover .inner { border-color: rgba(0,255,163,.55); box-shadow: 0 0 12px rgba(0,255,163,.1) inset; }

/* GHOST — tertiary / nav */
.btn-ghost {
  background: radial-gradient(circle 80px at 80% -10%, #2a2a2a, #111);
}
.btn-ghost .blob1 {
  background: radial-gradient(circle 60px at 0% 100%, rgba(100,100,100,.2), transparent);
  box-shadow: none;
}
.btn-ghost .inner {
  background: radial-gradient(circle 80px at 80% -50%, #2a2a2a, #0f1111);
  color: var(--text);
  border: 1px solid var(--border2);
}
.btn-ghost:hover .inner { color: var(--gold); border-color: rgba(245,166,35,.35); }

/* DANGER — destructive */
.btn-danger {
  background: radial-gradient(circle 80px at 80% -10%, #3a0000, #1b1111);
}
.btn-danger .blob1 {
  background: radial-gradient(circle 60px at 0% 100%, rgba(255,61,61,.3), transparent);
  box-shadow: -10px 10px 30px rgba(255,61,61,.1);
}
.btn-danger .inner {
  background: radial-gradient(circle 80px at 80% -50%, #2a0000, #0f1111);
  color: var(--red);
}
.btn-danger:hover .inner { background: radial-gradient(circle 80px at 80% -50%, #3a0000, #1a1111); }

/* ── SIZE MODIFIERS ── */
.btn-sm .inner { padding: 6px 14px; }
.btn-sm { font-size: .62rem; border-radius: 12px; }
.btn-sm .inner { border-radius: 10px; }
.btn-sm .blob1 { border-radius: 12px; }

.btn-lg .inner { padding: 14px 34px; }
.btn-lg { font-size: .8rem; border-radius: 18px; }

.btn-full { width: 100%; }
.btn-full .inner { width: 100%; }

/* ── PULSE (CTA highlight) ── */
.btn-pulse {
  animation: btnPulseGlow 2.5s ease-in-out infinite;
}
@keyframes btnPulseGlow {
  0%,100% { box-shadow: 0 0 18px rgba(0,255,163,.3), 0 4px 16px rgba(0,0,0,.5); }
  50%      { box-shadow: 0 0 42px rgba(0,255,163,.6), 0 0 20px rgba(0,229,255,.2), 0 4px 24px rgba(0,0,0,.5); }
}

/* ── DISABLED ── */
.btn:disabled,
.btn[disabled] {
  opacity: .4;
  cursor: not-allowed;
  transform: none !important;
  pointer-events: none;
}

/* ══════════════════════════════
   CARDS & SURFACES
══════════════════════════════ */
.card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 24px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: var(--t);
  box-shadow: 0 0 0 1px rgba(0,255,163,.04), inset 0 1px 0 rgba(255,255,255,.04);
}
.card:hover { border-color: rgba(0,255,163,.2); box-shadow: 0 0 30px rgba(0,255,163,.06), inset 0 1px 0 rgba(255,255,255,.05); }
.card-glow:hover {
  border-color: rgba(0,255,163,.3);
  box-shadow: 0 0 40px rgba(0,255,163,.1), 0 8px 32px rgba(0,0,0,.4);
}

/* ══════════════════════════════
   FORM ELEMENTS
══════════════════════════════ */
.form-group { display: flex; flex-direction: column; gap: 7px; }
.form-label {
  font-family: var(--font-mono);
  font-size: .65rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.form-input, .form-select, .form-textarea {
  background: rgba(13,17,23,.8);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: .95rem;
  outline: none;
  transition: var(--t);
  width: 100%;
}
.form-input::placeholder { color: var(--text3); }
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(0,255,163,.1), 0 0 16px rgba(0,255,163,.08);
}
.form-select { cursor: pointer; }
.form-select option { background: var(--card); }
.form-textarea { resize: vertical; min-height: 100px; }

.input-group { position: relative; }
.input-group .input-prefix {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-family: var(--font-mono);
  font-size: .8rem;
  pointer-events: none;
}
.input-group .form-input { padding-left: 36px; }

/* ══════════════════════════════
   BADGES & TAGS
══════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: .62rem;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid;
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
}
.badge-gold  { color: var(--gold);  border-color: rgba(0,255,163,.35); background: rgba(0,255,163,.08); }
.badge-cyan  { color: var(--cyan);  border-color: rgba(0,229,255,.3);   background: rgba(0,229,255,.08); }
.badge-green { color: var(--gold); border-color: rgba(0,255,163,.3);   background: rgba(0,255,163,.08); }
.badge-red   { color: var(--red);   border-color: rgba(255,61,61,.3);   background: rgba(255,61,61,.08); }

/* ══════════════════════════════
   PAGE LAYOUT
══════════════════════════════ */
.page-wrap {
  padding-top: var(--nav-h);
  min-height: 100vh;
  position: relative;
  z-index: 1;
}
.container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
.container-sm { max-width: 520px; margin: 0 auto; padding: 0 24px; }
.container-md { max-width: 800px; margin: 0 auto; padding: 0 32px; }

/* ══════════════════════════════
   SECTION HEADERS
══════════════════════════════ */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
}
.section-title .accent { color: var(--gold); }
.section-sub { font-size: .82rem; color: var(--text3); margin-top: 4px; font-family: var(--font-mono); }

/* ══════════════════════════════
   STAT CARDS
══════════════════════════════ */
.stat-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  backdrop-filter: blur(12px);
  padding: 20px 24px;
  transition: var(--t);
}
.stat-card:hover { border-color: var(--border2); }
.stat-label {
  font-family: var(--font-mono);
  font-size: .65rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.stat-change {
  font-family: var(--font-mono);
  font-size: .7rem;
  color: var(--text3);
  margin-top: 6px;
}
.stat-change.up { color: var(--green); }
.stat-change.down { color: var(--red); }

/* ══════════════════════════════
   TABLES
══════════════════════════════ */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .85rem;
}
.data-table th {
  font-family: var(--font-mono);
  font-size: .62rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(245,166,35,.03); }
.table-wrap {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  backdrop-filter: blur(8px);
  overflow: hidden;
}

/* ══════════════════════════════
   MODAL / OVERLAY
══════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 800;
  backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: rgba(17,20,25,.92);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 0 0 1px rgba(0,255,163,.06), 0 32px 80px rgba(0,0,0,.6);
  border-radius: 16px;
  padding: 36px;
  width: 100%;
  max-width: 480px;
  position: relative;
  animation: modalIn .3s ease;
}
.modal-lg { max-width: 700px; }
@keyframes modalIn {
  from { transform: translateY(24px) scale(.97); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text3);
  font-size: .9rem;
  transition: var(--t);
}
.modal-close:hover { border-color: var(--gold); color: var(--gold); }
.modal-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: 1px;
}
.modal-sub { font-size: .82rem; color: var(--text3); margin-bottom: 28px; font-family: var(--font-mono); }

/* ══════════════════════════════
   TOAST NOTIFICATIONS
══════════════════════════════ */
.toast-stack {
  position: fixed;
  bottom: 24px; right: 24px;
  z-index: 9990;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}
.toast {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 18px;
  font-size: .82rem;
  min-width: 280px;
  pointer-events: all;
  animation: toastIn .3s ease;
  box-shadow: 0 8px 30px rgba(0,0,0,.4);
}
@keyframes toastIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
.toast.success { border-color: rgba(0,229,135,.4); }
.toast.error   { border-color: rgba(255,61,61,.4); }
.toast.info    { border-color: rgba(245,166,35,.4); }
.toast-icon { font-size: 1.1rem; flex-shrink: 0; }
.toast-msg { flex: 1; color: var(--text); font-family: var(--font-body); }

/* ══════════════════════════════
   TABS
══════════════════════════════ */
.tab-bar {
  display: flex;
  gap: 4px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
}
.tab-item {
  flex: 1;
  padding: 9px 16px;
  text-align: center;
  border-radius: 7px;
  font-family: var(--font-display);
  font-size: .65rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--t);
  color: var(--text3);
  border: none;
  background: none;
}
.tab-item.active { background: var(--gold); color: #000; font-weight: 700; box-shadow: 0 0 16px rgba(0,255,163,.3); }
.tab-item:hover:not(.active) { color: var(--text); background: var(--card2); }

/* ══════════════════════════════
   DIVIDERS
══════════════════════════════ */
.divider {
  width: 100%;
  height: 1px;

<script>
/* ═══════════════════════════════════════════
   ENTROPY TOOLS — Core App (Auth + State)
═══════════════════════════════════════════ */

const ET = (() => {

  // ── DEFAULT SERVICES CONFIG ──
  const DEFAULT_SERVICES = [
    {
      id: 'position-gen',
      name: 'Position Generator',
      desc: 'Generate professional trading position cards with entry, exit, and P&L details.',
      icon: '📊',
      category: 'Trading',
      price: 200,
      isFree: false,
      repo: 'https://entrobee74.github.io/Position-gen',
      githubRepo: 'https://github.com/entrobee74/Position-gen',
      active: true,
    },
    {
      id: 'crypto-receipt',
      name: 'Transaction Receipt',
      desc: 'Generate professional crypto transaction receipts for any blockchain transfer.',
      icon: '🧾',
      category: 'Crypto',
      price: 150,
      isFree: false,
      repo: 'https://entrobee74.github.io/crypto-receipt',
      githubRepo: 'https://github.com/entrobee74/crypto-receipt',
      active: true,
    },
    {
      id: 'support-center',
      name: 'Support Center',
      desc: 'Build and deploy a customised support/help center site instantly.',
      icon: '🛠️',
      category: 'Site Builder',
      price: 300,
      isFree: false,
      repo: 'https://entrobee74.github.io/Support-center',
      githubRepo: 'https://github.com/entrobee74/Support-center',
      active: true,
    },
  ];

  // ── DEFAULT ADMIN ──
  const DEFAULT_ADMIN = {
    id: 'admin',
    name: 'Admin',
    email: 'admin@entropytools.com',
    password: 'Admin@2025',  // change after first login
    role: 'admin',
    createdAt: new Date().toISOString(),
  };

  // ── STORAGE HELPERS ──
  const db = {
    get: (k, def = null) => {
      try { const v = localStorage.getItem('et_' + k); return v ? JSON.parse(v) : def; }
      catch { return def; }
    },
    set: (k, v) => { try { localStorage.setItem('et_' + k, JSON.stringify(v)); } catch {} },
    del: (k) => { localStorage.removeItem('et_' + k); },
  };

  // ── INIT DB ──
  function initDB() {
    if (!db.get('initialized')) {
      db.set('users', [DEFAULT_ADMIN]);
      db.set('services', DEFAULT_SERVICES);
      db.set('transactions', []);
      db.set('generations', []);
      db.set('initialized', true);
    }
    // Ensure services exist (for updates)
    if (!db.get('services')) db.set('services', DEFAULT_SERVICES);
  }

  // ── AUTH ──
  const auth = {
    current: () => db.get('current_user'),
    isLoggedIn: () => !!db.get('current_user'),
    isAdmin: () => { const u = db.get('current_user'); return u && u.role === 'admin'; },

    login(email, password) {
      const users = db.get('users', []);
      const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
      if (!user) return { ok: false, msg: 'Invalid email or password.' };
      db.set('current_user', user);
      return { ok: true, user };
    },

    register(name, email, password) {
      const users = db.get('users', []);
      if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
        return { ok: false, msg: 'Email already registered.' };
      }
      const user = {
        id: 'u_' + Date.now(),
        name, email, password,
        role: 'user',
        balance: 0,
        totalDeposited: 0,
        totalSpent: 0,
        uses: 0,
        createdAt: new Date().toISOString(),
      };
      users.push(user);
      db.set('users', users);
      db.set('current_user', user);
      return { ok: true, user };
    },

    logout() {
      db.del('current_user');
      window.location.href = '/index.html';
    },

    updateUser(updates) {
      const users = db.get('users', []);
      const cur = db.get('current_user');
      const idx = users.findIndex(u => u.id === cur.id);
      if (idx === -1) return;
      Object.assign(users[idx], updates);
      db.set('users', users);
      db.set('current_user', users[idx]);
      return users[idx];
    },

    getUser(id) {
      return db.get('users', []).find(u => u.id === id);
    },

    getAllUsers() {
      return db.get('users', []).filter(u => u.role !== 'admin');
    },
  };

  // ── WALLET ──
  const wallet = {
    balance() { return parseFloat(auth.current()?.balance || 0); },

    credit(amount, ref, note = 'Wallet Deposit') {
      const user = auth.current();
      if (!user) return;
      const newBal = (parseFloat(user.balance || 0) + amount).toFixed(2);
      auth.updateUser({
        balance: parseFloat(newBal),
        totalDeposited: (parseFloat(user.totalDeposited || 0) + amount),
      });
      transactions.add({
        userId: user.id,
        type: 'credit',
        amount,
        note,
        ref,
        icon: '💳',
      });
      return parseFloat(newBal);
    },

    deduct(amount, note = 'Tool Use') {
      const user = auth.current();
      if (!user) return false;
      if (parseFloat(user.balance || 0) < amount) return false;
      const newBal = (parseFloat(user.balance || 0) - amount).toFixed(2);
      auth.updateUser({
        balance: parseFloat(newBal),
        totalSpent: (parseFloat(user.totalSpent || 0) + amount),
        uses: (parseInt(user.uses || 0) + 1),
      });
      transactions.add({
        userId: user.id,
        type: 'debit',
        amount,
        note,
        ref: 'USE_' + Date.now(),
        icon: '⚡',
      });
      return true;
    },
  };

  // ── TRANSACTIONS ──
  const transactions = {
    add(tx) {
      const all = db.get('transactions', []);
      all.unshift({ ...tx, id: 'tx_' + Date.now(), date: new Date().toISOString() });
      db.set('transactions', all.slice(0, 500));
    },
    forUser(userId) {
      return db.get('transactions', []).filter(t => t.userId === userId);
    },
    all() { return db.get('transactions', []); },
  };

  // ── SERVICES ──
  const services = {
    all() { return db.get('services', DEFAULT_SERVICES); },
    active() { return services.all().filter(s => s.active); },
    get(id) { return services.all().find(s => s.id === id); },

    updatePrice(id, price) {
      const all = services.all();
      const s = all.find(s => s.id === id);
      if (s) { s.price = price; db.set('services', all); }
    },

    updateService(id, updates) {
      const all = services.all();
      const idx = all.findIndex(s => s.id === id);
      if (idx > -1) { Object.assign(all[idx], updates); db.set('services', all); }
    },

    toggle(id) {
      const all = services.all();
      const s = all.find(s => s.id === id);
      if (s) { s.active = !s.active; db.set('services', all); }
    },
  };

  // ── GENERATIONS ──
  const generations = {
    add(gen) {
      const all = db.get('generations', []);
      const id = 'gen_' + Date.now();
      all.unshift({ ...gen, id, date: new Date().toISOString() });
      db.set('generations', all.slice(0, 1000));
      return id;
    },
    forUser(userId) {
      return db.get('generations', []).filter(g => g.userId === userId);
    },
    all() { return db.get('generations', []); },
    get(id) { return db.get('generations', []).find(g => g.id === id); },
  };

  // ── ADMIN STATS ──
  const stats = {
    overview() {
      const users = auth.getAllUsers();
      const txns = transactions.all();
      const gens = generations.all();
      const credits = txns.filter(t => t.type === 'credit').reduce((s, t) => s + t.amount, 0);
      const debits  = txns.filter(t => t.type === 'debit').reduce((s, t) => s + t.amount, 0);
      return {
        totalUsers: users.length,
        totalRevenue: debits,
        totalDeposited: credits,
        totalGenerations: gens.length,
        activeUsers: users.filter(u => u.uses > 0).length,
      };
    },
  };

  // ── UI HELPERS ──
  const ui = {
    toast(msg, type = 'info', dur = 4000) {
      let stack = document.getElementById('toast-stack');
      if (!stack) {
        stack = document.createElement('div');
        stack.id = 'toast-stack';
        stack.className = 'toast-stack';
        document.body.appendChild(stack);
      }
      const icons = { success: '✅', error: '❌', info: '⚡', warn: '⚠️' };
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span class="toast-msg">${msg}</span>`;
      stack.appendChild(el);
      setTimeout(() => el.remove(), dur);
    },

    hideLoader() {
      const l = document.getElementById('page-loader');
      if (l) { setTimeout(() => l.classList.add('hidden'), 800); }
    },

    requireAuth(adminOnly = false) {
      if (!auth.isLoggedIn()) { window.location.href = '/auth.html'; return false; }
      if (adminOnly && !auth.isAdmin()) { window.location.href = '/dashboard.html'; return false; }
      return true;
    },

    formatMoney(n) { return '₦' + parseFloat(n || 0).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); },
    formatDate(d) { return new Date(d).toLocaleDateString('en-NG', { day:'2-digit', month:'short', year:'numeric' }); },
    formatDateTime(d) { return new Date(d).toLocaleString('en-NG', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); },

    setNavBalance() {
      const el = document.getElementById('nav-balance-val');
      if (el) el.textContent = ui.formatMoney(auth.current()?.balance || 0);
    },

    fillNavUser() {
      const user = auth.current();
      if (!user) return;
      const nameEl = document.getElementById('nav-user-name');
      if (nameEl) nameEl.textContent = user.name;
      ui.setNavBalance();
    },
  };

  // ── INIT ──
  initDB();

  return { auth, wallet, transactions, services, generations, stats, ui, db };
})();

// ── GLOBAL HELPERS ──
function showLoader() {
  const l = document.getElementById('page-loader');
  if (l) l.classList.remove('hidden');
}
function hideLoader() {
  const l = document.getElementById('page-loader');
  if (l) setTimeout(() => l.classList.add('hidden'), 900);
}

// Page load handler
document.addEventListener('DOMContentLoaded', () => {
  hideLoader();
  ET.ui.fillNavUser();
});

</script>
<script>
/* ═══════════════════════════════════════════
   ENTROPY TOOLS — Services Logic
═══════════════════════════════════════════ */

const ServicesHandler = {

  // Launch a tool after deducting credits
  async launch(serviceId) {
    if (!ET.ui.requireAuth()) return;

    const service = ET.services.get(serviceId);
    if (!service) { ET.ui.toast('Service not found.', 'error'); return; }
    if (!service.active) { ET.ui.toast('This service is currently unavailable.', 'warn'); return; }

    const user = ET.auth.current();
    const balance = parseFloat(user.balance || 0);

    // Free service or has balance
    if (!service.isFree && service.price > 0) {
      if (balance < service.price) {
        ET.ui.toast(`Insufficient balance. Need ₦${service.price}. Please deposit first.`, 'error', 5000);
        setTimeout(() => window.location.href = '/deposit.html', 1500);
        return;
      }

      // Confirm launch
      const confirmed = await ServicesHandler.confirmModal(service);
      if (!confirmed) return;

      const deducted = ET.wallet.deduct(service.price, `${service.name} — Use`);
      if (!deducted) {
        ET.ui.toast('Failed to deduct credits. Please try again.', 'error');
        return;
      }
      ET.ui.toast(`₦${service.price} deducted. Launching ${service.name}...`, 'info');
      ET.ui.setNavBalance();
    }

    // Show generation overlay then open tool
    ServicesHandler.showGenOverlay(service, () => {
      ServicesHandler.openTool(service);
    });
  },

  showGenOverlay(service, onDone) {
    // Remove any existing overlay
    document.getElementById('gen-overlay')?.remove();

    const overlay = document.createElement('div');
    overlay.id = 'gen-overlay';
    overlay.innerHTML = `
      <style>
        #gen-overlay {
          position: fixed; inset: 0; z-index: 9000;
          background: rgba(5,7,9,.96);
          backdrop-filter: blur(10px);
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          gap: 24px;
          animation: genOverlayIn .3s ease;
        }
        @keyframes genOverlayIn {
          from { opacity: 0; } to { opacity: 1; }
        }
        #gen-overlay .go-title {
          font-family: var(--font-mono);
          font-size: .65rem;
          color: var(--text3);
          text-transform: uppercase;
          letter-spacing: 3px;
        }
        #gen-overlay .go-service {
          font-family: var(--font-display);
          font-size: 1rem;
          font-weight: 700;
          color: var(--gold);
          letter-spacing: 2px;
        }
        /* Ring loader (uiverse.io by dexter-st) — gold themed */
        #gen-overlay .gen-loader-wrap {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
          width: 180px; height: 180px;
          border-radius: 50%;
          background-color: transparent;
          user-select: none;
        }
        #gen-overlay .gen-loader {
          position: absolute; top: 0; left: 0;
          width: 100%; aspect-ratio: 1/1;
          border-radius: 50%;
          background-color: transparent;
          animation: gen-loader-rotate 2s linear infinite;
          z-index: 0;
        }
        @keyframes gen-loader-rotate {
          0% {
            transform: rotate(90deg);
            box-shadow:
              0 10px 20px 0 rgba(245,202,90,.9) inset,
              0 20px 30px 0 rgba(245,166,35,.7) inset,
              0 60px 60px 0 rgba(120,70,0,.8) inset;
          }
          50% {
            transform: rotate(270deg);
            box-shadow:
              0 10px 20px 0 rgba(255,255,255,.8) inset,
              0 20px 10px 0 rgba(245,166,35,.9) inset,
              0 40px 60px 0 rgba(80,40,0,.9) inset;
          }
          100% {
            transform: rotate(450deg);
            box-shadow:
              0 10px 20px 0 rgba(245,202,90,.9) inset,
              0 20px 30px 0 rgba(245,166,35,.7) inset,
              0 60px 60px 0 rgba(120,70,0,.8) inset;
          }
        }
        #gen-overlay .gen-loader-letter {
          display: inline-block;
          opacity: 0.4;
          transform: translateY(0);
          animation: gen-letter-anim 2s infinite;
          z-index: 1;
          font-family: var(--font-display);
          font-size: .78rem;
          font-weight: 700;
          letter-spacing: 1px;
          color: var(--gold);
        }
        #gen-overlay .gen-loader-letter:nth-child(1)  { animation-delay: 0s; }
        #gen-overlay .gen-loader-letter:nth-child(2)  { animation-delay: .1s; }
        #gen-overlay .gen-loader-letter:nth-child(3)  { animation-delay: .2s; }
        #gen-overlay .gen-loader-letter:nth-child(4)  { animation-delay: .3s; }
        #gen-overlay .gen-loader-letter:nth-child(5)  { animation-delay: .4s; }
        #gen-overlay .gen-loader-letter:nth-child(6)  { animation-delay: .5s; }
        #gen-overlay .gen-loader-letter:nth-child(7)  { animation-delay: .6s; }
        #gen-overlay .gen-loader-letter:nth-child(8)  { animation-delay: .7s; }
        #gen-overlay .gen-loader-letter:nth-child(9)  { animation-delay: .8s; }
        #gen-overlay .gen-loader-letter:nth-child(10) { animation-delay: .9s; }
        @keyframes gen-letter-anim {
          0%, 100% { opacity: 0.4; transform: translateY(0); }
          20%       { opacity: 1; transform: scale(1.2); text-shadow: 0 0 12px rgba(245,166,35,.8); }
          40%       { opacity: 0.7; transform: translateY(0); }
        }
        #gen-overlay .go-sub {
          font-family: var(--font-mono);
          font-size: .6rem;
          color: var(--text3);
          text-transform: uppercase;
          letter-spacing: 2.5px;
          animation: blink-go 1.2s step-end infinite;
        }
        @keyframes blink-go { 0%,100%{opacity:1} 50%{opacity:0} }
      </style>

      <div class="go-title">Entropy Tools</div>
      <div class="go-service">${service.icon} ${service.name}</div>

      <div class="gen-loader-wrap">
        <div class="gen-loader"></div>
        <span class="gen-loader-letter">G</span>
        <span class="gen-loader-letter">E</span>
        <span class="gen-loader-letter">N</span>
        <span class="gen-loader-letter">E</span>
        <span class="gen-loader-letter">R</span>
        <span class="gen-loader-letter">A</span>
        <span class="gen-loader-letter">T</span>
        <span class="gen-loader-letter">I</span>
        <span class="gen-loader-letter">N</span>
        <span class="gen-loader-letter">G</span>
      </div>

      <div class="go-sub" id="gen-overlay-status">processing request...</div>
    `;
    document.body.appendChild(overlay);

    // Status message sequence
    const steps = [
      [400,  'verifying balance...'],
      [900,  'recording generation...'],
      [1500, 'opening tool...'],
    ];
    steps.forEach(([delay, msg]) => {
      setTimeout(() => {
        const el = document.getElementById('gen-overlay-status');
        if (el) el.textContent = msg;
      }, delay);
    });

    // Run callback then fade out
    setTimeout(() => {
      if (onDone) onDone();
      // Fade out overlay
      setTimeout(() => {
        overlay.style.opacity = '0';
        overlay.style.transition = 'opacity .4s ease';
        setTimeout(() => overlay.remove(), 400);
      }, 300);
    }, 1800);
  },

  openTool(service) {
    // Record generation
    const genId = ET.generations.add({
      userId: ET.auth.current().id,
      serviceId: service.id,
      serviceName: service.name,
      price: service.price,
      viewLink: ServicesHandler.makeViewLink(service.id),
    });

    // Build launcher URL
    const launchUrl = `/tool-frame.html?id=${service.id}&gen=${genId}`;

    // Open in new tab
    window.open(launchUrl, '_blank');
  },

  makeViewLink(serviceId) {
    return `${window.location.origin}/view.html?id=${serviceId}&t=${Date.now()}`;
  },

  confirmModal(service) {
    return new Promise((resolve) => {
      // Inject confirm modal
      let existing = document.getElementById('launch-confirm-modal');
      if (existing) existing.remove();

      const modal = document.createElement('div');
      modal.id = 'launch-confirm-modal';
      modal.className = 'modal-overlay open';
      modal.innerHTML = `
        <div class="modal" style="max-width:400px">
          <div class="modal-title">⚡ Confirm Launch</div>
          <p class="modal-sub">This will deduct credits from your wallet</p>
          <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:14px">
              <span style="font-size:2rem">${service.icon}</span>
              <div>
                <div style="font-family:var(--font-display);font-weight:700;font-size:.9rem">${service.name}</div>
                <div style="color:var(--text3);font-size:.8rem;margin-top:2px">${service.category}</div>
              </div>
            </div>
            <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
              <span style="font-family:var(--font-mono);font-size:.72rem;color:var(--text3)">Cost</span>
              <span style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--gold)">₦${service.price.toLocaleString()}</span>
            </div>
            <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-family:var(--font-mono);font-size:.72rem;color:var(--text3)">Your Balance</span>
              <span style="font-family:var(--font-display);font-size:.9rem;font-weight:600;color:var(--text)">${ET.ui.formatMoney(ET.auth.current()?.balance)}</span>
            </div>
          </div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-ghost" style="flex:1" id="launch-cancel"><span class="blob1"></span><span class="inner">Cancel</span></button>
            <button class="btn btn-gold" style="flex:2" id="launch-confirm"><span class="blob1"></span><span class="inner">Launch Tool →</span></button>
          </div>
        </div>`;
      document.body.appendChild(modal);

      document.getElementById('launch-cancel').onclick = () => { modal.remove(); resolve(false); };
      document.getElementById('launch-confirm').onclick = () => { modal.remove(); resolve(true); };
      modal.addEventListener('click', e => { if (e.target === modal) { modal.remove(); resolve(false); } });
    });
  },

  // Render service cards
  renderCards(containerId, services) {
    const container = document.getElementById(containerId);
    if (!container) return;
    if (!services || services.length === 0) {
      container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3);font-family:var(--font-mono)">No services available</div>`;
      return;
    }

    container.innerHTML = services.map(s => `
      <div class="card hover-glow fade-up" style="display:flex;flex-direction:column;gap:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
          <div style="width:50px;height:50px;background:var(--gold-dim);border:1px solid rgba(245,166,35,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem">${s.icon}</div>
          <span class="badge badge-gold">${s.category}</span>
        </div>
        <div style="font-family:var(--font-display);font-weight:700;font-size:.95rem;letter-spacing:1px;margin-bottom:8px">${s.name}</div>
        <div style="color:var(--text3);font-size:.85rem;line-height:1.6;flex:1;margin-bottom:20px">${s.desc}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid var(--border)">
          <div>
            <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--gold)">${s.isFree || s.price === 0 ? 'FREE' : '₦' + s.price.toLocaleString()}</div>
            <div style="font-family:var(--font-mono);font-size:.6rem;color:var(--text3)">per use</div>
          </div>
          <div style="display:flex;gap:8px">
            <a href="${s.githubRepo}" target="_blank" class="btn btn-ghost btn-sm" title="View Source"><span class="blob1"></span><span class="inner">⌥</span></a>
            <button class="btn btn-gold btn-sm" onclick="ServicesHandler.launch('${s.id}')"><span class="blob1"></span><span class="inner">Launch →</span></button>
          </div>
        </div>
      </div>`).join('');
  },

  // Render user's generation history
  renderGenerations(containerId, gens) {
    const container = document.getElementById(containerId);
    if (!container) return;
    if (!gens.length) {
      container.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text3);font-family:var(--font-mono)">No generations yet</td></tr>`;
      return;
    }
    container.innerHTML = gens.map(g => `
      <tr>
        <td><span style="font-family:var(--font-mono);font-size:.7rem;color:var(--text3)">${g.id}</span></td>
        <td>${g.serviceName}</td>
        <td>${ET.ui.formatDateTime(g.date)}</td>
        <td><span style="color:var(--red);font-family:var(--font-display);font-weight:600">-₦${(g.price||0).toLocaleString()}</span></td>
        <td>
          <div style="display:flex;gap:6px">
            <a href="${g.viewLink}" target="_blank" class="btn btn-ghost btn-sm"><span class="blob1"></span><span class="inner">👁 View</span></a>
            <button class="btn btn-outline btn-sm" onclick="ServicesHandler.downloadGen('${g.id}')"><span class="blob1"></span><span class="inner">↓ Download</span></button>
          </div>
        </td>
      </tr>`).join('');
  },

  downloadGen(genId) {
    const gen = ET.generations.get(genId);
    if (!gen) { ET.ui.toast('Generation not found', 'error'); return; }
    // Build download content
    const content = `ENTROPY TOOLS — Generation Record
=====================================
Service:     ${gen.serviceName}
Generated:   ${ET.ui.formatDateTime(gen.date)}
Reference:   ${gen.id}
Cost:        ₦${(gen.price||0).toLocaleString()}
View Link:   ${gen.viewLink}
User:        ${gen.userId}
=====================================
Generated by Entropy Tools
${window.location.origin}
`;
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `entropy-${genId}.txt`;
    a.click();
    URL.revokeObjectURL(url);
    ET.ui.toast('Receipt downloaded!', 'success');
  },
};

</script>
